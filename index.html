<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3Dオセロ</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

#info{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

canvas{
display:block;
}
</style>

</head>

<body>

<div id="info">3Dオセロ（黒の番）</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(6,8,10)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

controls.enableDamping=true

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,7)
scene.add(light)

const ambient=new THREE.AmbientLight(0x888888)
scene.add(ambient)

const board=[]

const tileGeo=new THREE.BoxGeometry(1,0.2,1)
const tileMat=new THREE.MeshPhongMaterial({color:0x0a7a2f})

for(let y=0;y<8;y++){
board[y]=[]

for(let x=0;x<8;x++){

const tile=new THREE.Mesh(tileGeo,tileMat)

tile.position.set(x-3.5,0,y-3.5)

scene.add(tile)

board[y][x]=0

}

}

const diskGeo=new THREE.CylinderGeometry(0.4,0.4,0.15,32)

function createDisk(color,x,y){

const mat=new THREE.MeshPhongMaterial({
color: color==1?0x000000:0xffffff
})

const disk=new THREE.Mesh(diskGeo,mat)

disk.position.set(x-3.5,0.2,y-3.5)

scene.add(disk)

return disk

}

const disks=[]

function placeInitial(){

place(3,3,-1)
place(4,4,-1)
place(3,4,1)
place(4,3,1)

}

function place(x,y,color){

board[y][x]=color

const disk=createDisk(color,x,y)

disks.push(disk)

}

placeInitial()

let player=1

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

window.addEventListener("click",onClick)

function onClick(event){

mouse.x=(event.clientX/window.innerWidth)*2-1
mouse.y=-(event.clientY/window.innerHeight)*2+1

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(scene.children)

for(let i of intersects){

const pos=i.object.position

const x=Math.round(pos.x+3.5)
const y=Math.round(pos.z+3.5)

if(x>=0&&x<8&&y>=0&&y<8){

if(board[y][x]==0){

place(x,y,player)

player*=-1

}

}

}

}

function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
